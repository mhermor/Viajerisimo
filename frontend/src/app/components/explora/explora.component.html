<div class="explora-container">
  <h2>Explora por Categoría</h2>

  <div class="categoria-menu">
    <button (click)="filtrarPorCategoria('todos')" [class.active]="categoriaActiva === 'todos'">Todos</button>
    <button (click)="filtrarPorCategoria('playa')" [class.active]="categoriaActiva === 'playa'">Playa</button>
    <button (click)="filtrarPorCategoria('montaña')" [class.active]="categoriaActiva === 'montaña'">Montaña</button>
    <button (click)="filtrarPorCategoria('ciudad')" [class.active]="categoriaActiva === 'ciudad'">Ciudad</button>
  </div>

  <div class="destinos-grid">
    <div class="card" *ngFor="let destino of destinosFiltrados" [routerLink]="['/destino', destino.id]" style="cursor:pointer">
      <img [src]="destino.imagen" [alt]="destino.nombre">
      <div class="card-overlay">
        <div class="card-content">
          <h3>{{ destino.nombre }}, {{ destino.pais }}</h3>
          <p>{{ destino.descripcion }}</p>
          <p class="precio">Desde {{ destino.precio }}€</p>
        </div>
      </div>
    </div>
    <p *ngIf="destinosFiltrados.length === 0">No hay destinos en esta categoría todavía.</p>
  </div>
</div>
