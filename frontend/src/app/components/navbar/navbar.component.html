<link href='https://fonts.googleapis.com/css?family=Sour+Gummy' rel='stylesheet'>

<!-- Logo -->
<div class="logo-fixed" [class.hidden]="isOpen">
  <span class="brand">Viajerísimo</span>
  <span class="icon">✈️</span>
</div>

<!-- Botón hamburguesa -->
<button class="hamburger" (click)="toggleMenu()" [class.open]="isOpen">
  <span></span>
  <span></span>
  <span></span>
</button>

<!-- Overlay para cerrar al hacer click fuera -->
<div class="overlay" [class.visible]="isOpen" (click)="closeMenu()"></div>

<!-- Sidebar -->
<nav class="sidebar" [class.open]="isOpen">

<!--   <div class="sidebar-header">
    <span class="sidebar-brand">Viajerísimo ✈️</span>
  </div> -->

  <ul class="nav-links">
    <li>
      <a href="/" (click)="closeMenu()">
        <span class="nav-icon">🏠</span> Inicio
      </a>
    </li>
    <li>
      <a href="/destinos" (click)="closeMenu()">
        <span class="nav-icon">🗺️</span> Destinos
      </a>
    </li>
    <li>
      <a href="/about" (click)="closeMenu()">
        <span class="nav-icon">ℹ️</span> Sobre nosotros
      </a>
    </li>
    <li>
      <a href="/contacto" (click)="closeMenu()">
        <span class="nav-icon">✉️</span> Contacto
      </a>
    </li>
  </ul>

  <div class="sidebar-footer">
    <a href="/usuario" (click)="closeMenu()" class="btn-perfil">
      <span>👤</span>
      <span>{{ getNombre() || 'Mi perfil' }}</span>
    </a>
  </div>

</nav>
